<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EduMaster Course Management System</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../static/css/style.css">
    
    <style>
        /* Additional styles specific to registration page */
        .register-container {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 3rem;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeInScale 0.6s ease-out;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .register-header h2 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .register-header p {
            color: #666;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 1.1rem;
            z-index: 1;
        }

        .form-control {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 3rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            background: white;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Role selection styling */
        .role-group {
            margin-bottom: 1.5rem;
        }

        .role-label {
            display: block;
            margin-bottom: 0.75rem;
            font-weight: 600;
            color: #333;
        }

        .role-options {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .role-option {
            flex: 1;
            position: relative;
        }

        .role-option input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .role-option label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            font-weight: 500;
        }

        .role-option input:checked + label {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            color: #667eea;
            transform: scale(1.02);
        }

        .role-option label i {
            font-size: 1.2rem;
        }

        .btn-register {
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e0e0e0;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-link a:hover {
            color: #764ba2;
        }

        /* Password strength indicator */
        .password-strength {
            margin-top: 0.5rem;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background 0.3s ease;
        }

        .strength-text {
            font-size: 0.75rem;
            margin-top: 0.25rem;
            color: #666;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .register-card {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation"></div>

    <!-- Simple Navbar for Registration Page -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo">
                <i class="fas fa-graduation-cap"></i>
                <span>EduMaster</span>
            </a>
            <div class="nav-links">
                <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
            </div>
        </div>
    </nav>

    <!-- Messages Container -->
    <div class="messages-container" id="messagesContainer">
        <!-- Dynamic messages will appear here -->
    </div>

    <!-- Registration Form -->
    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <div style="width: 70px; height: 70px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
                    <i class="fas fa-user-plus" style="font-size: 2rem; color: white;"></i>
                </div>
                <h2>Create Account</h2>
                <p>Join EduMaster and start learning today</p>
            </div>

            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" class="form-control" placeholder="Username" required>
                    </div>
                    <div class="form-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" class="form-control" placeholder="Email" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" class="form-control" placeholder="Password" required>
                        <div class="password-strength">
                            <div class="strength-bar" id="strengthBar"></div>
                        </div>
                        <div class="strength-text" id="strengthText"></div>
                    </div>
                    <div class="form-group">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password" required>
                    </div>
                </div>

                <div class="role-group">
                    <div class="role-label">
                        <i class="fas fa-user-tag"></i> Select Your Role
                    </div>
                    <div class="role-options">
                        <div class="role-option">
                            <input type="radio" name="role" id="student" value="student" checked>
                            <label for="student">
                                <i class="fas fa-graduation-cap"></i>
                                Student
                            </label>
                        </div>
                        <div class="role-option">
                            <input type="radio" name="role" id="teacher" value="teacher">
                            <label for="teacher">
                                <i class="fas fa-chalkboard-teacher"></i>
                                Teacher
                            </label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-register">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="login-link">
                <p>Already have an account? <a href="login.html">Sign In</a></p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <!-- <p>&copy; 2024 EduMaster. All rights reserved.</p> -->
             <p>&copy; 2026 EduMaster.<br>
            Developed by <strong>Fatema Akther</strong>, Dept. of CSE, CSTU.</p>
            
            <div class="footer-links">
                <a href="#"><i class="fas fa-question-circle"></i> Help</a>
                <a href="#"><i class="fas fa-envelope"></i> Contact</a>
                <a href="#"><i class="fas fa-shield-alt"></i> Privacy</a>
            </div>
        </div>
    </footer>

    <script>
        // Password strength checker
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');

        function checkPasswordStrength(password) {
            let strength = 0;
            
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]+/)) strength++;
            if (password.match(/[A-Z]+/)) strength++;
            if (password.match(/[0-9]+/)) strength++;
            if (password.match(/[$@#&!]+/)) strength++;
            
            const strengthMap = {
                0: { width: '0%', color: '#e0e0e0', text: 'Very Weak' },
                1: { width: '20%', color: '#f44336', text: 'Weak' },
                2: { width: '40%', color: '#ff9800', text: 'Fair' },
                3: { width: '60%', color: '#ffc107', text: 'Good' },
                4: { width: '80%', color: '#4caf50', text: 'Strong' },
                5: { width: '100%', color: '#4caf50', text: 'Very Strong' }
            };
            
            return strengthMap[strength] || strengthMap[0];
        }

        passwordInput.addEventListener('input', function() {
            const strength = checkPasswordStrength(this.value);
            strengthBar.style.width = strength.width;
            strengthBar.style.background = strength.color;
            strengthText.textContent = strength.text;
            strengthText.style.color = strength.color;
        });

        // Real-time password match validation
        const confirmPassword = document.getElementById('confirmPassword');
        function validatePasswordMatch() {
            const password = passwordInput.value;
            const confirm = confirmPassword.value;
            
            if (confirm && password !== confirm) {
                confirmPassword.style.borderColor = '#f44336';
                return false;
            } else {
                confirmPassword.style.borderColor = '#4caf50';
                return true;
            }
        }

        passwordInput.addEventListener('input', validatePasswordMatch);
        confirmPassword.addEventListener('input', validatePasswordMatch);

        // Function to show messages
        function showMessage(message, type = 'success') {
            const messagesContainer = document.getElementById('messagesContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message message-${type}`;
            
            let icon = 'check-circle';
            if (type === 'error') icon = 'exclamation-circle';
            if (type === 'info') icon = 'info-circle';
            if (type === 'warning') icon = 'exclamation-triangle';
            
            messageDiv.innerHTML = `
                <i class="fas fa-${icon}"></i>
                <span>${message}</span>
                <button class="message-close">&times;</button>
            `;
            
            messagesContainer.appendChild(messageDiv);
            
            // Add close functionality
            messageDiv.querySelector('.message-close').addEventListener('click', function() {
                messageDiv.style.animation = 'slideOutRight 0.3s ease-out forwards';
                setTimeout(() => messageDiv.remove(), 300);
            });
            
            // Auto remove after 5 seconds
            setTimeout(() => {
                if (messageDiv.parentNode) {
                    messageDiv.style.animation = 'slideOutRight 0.3s ease-out forwards';
                    setTimeout(() => messageDiv.remove(), 300);
                }
            }, 5000);
        }

        // Save user data to localStorage
        function saveUser(userData) {
            let users = JSON.parse(localStorage.getItem('users') || '[]');
            
            // Check if user already exists
            const userExists = users.some(u => u.username === userData.username || u.email === userData.email);
            
            if (userExists) {
                showMessage('User with this username or email already exists!', 'error');
                return false;
            }
            
            users.push(userData);
            localStorage.setItem('users', JSON.stringify(users));
            return true;
        }

        // Handle form submission
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get form values
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = passwordInput.value;
            const confirm = confirmPassword.value;
            const role = document.querySelector('input[name="role"]:checked').value;
            
            // Validation
            if (!username || !email || !password || !confirm) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            if (username.length < 3) {
                showMessage('Username must be at least 3 characters long', 'error');
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                showMessage('Please enter a valid email address', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters long', 'error');
                return;
            }
            
            if (password !== confirm) {
                showMessage('Passwords do not match!', 'error');
                return;
            }
            
            // Create user object
            const userData = {
                username: username,
                email: email,
                password: password,
                role: role,
                registeredAt: new Date().toISOString()
            };
            
            // Save to localStorage
            if (saveUser(userData)) {
                showMessage(`Registration successful! Welcome ${username}! Redirecting to login...`, 'success');
                
                // Disable submit button
                const submitBtn = document.querySelector('.btn-register');
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Redirecting...';
                
                // Redirect to login page after 2 seconds
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            }
        });

        // Animate role selection on hover
        document.querySelectorAll('.role-option').forEach(option => {
            option.addEventListener('mouseenter', function() {
                this.style.transform = 'translateY(-3px)';
            });
            option.addEventListener('mouseleave', function() {
                this.style.transform = 'translateY(0)';
            });
        });

        // Add input focus effects
        const inputs = document.querySelectorAll('.form-control');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'translateX(5px)';
            });
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'translateX(0)';
            });
        });
    </script>
</body>
</html>
