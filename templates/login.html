{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<style>
    /* Additional styles specific to login page */
    .login-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
    }

    .login-card {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(20px);
        border-radius: 30px;
        padding: 3rem;
        width: 100%;
        max-width: 480px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(50px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .login-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .login-icon {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1rem;
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
    }

    .login-icon i {
        font-size: 2.5rem;
        color: white;
    }

    .login-header h2 {
        font-size: 2rem;
        color: #333;
        margin-bottom: 0.5rem;
    }

    .login-header p {
        color: #666;
    }

    .form-group {
        margin-bottom: 1.5rem;
        position: relative;
    }

    .form-group i {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #667eea;
        font-size: 1.1rem;
        z-index: 1;
    }

    .form-control {
        width: 100%;
        padding: 0.875rem 1rem 0.875rem 3rem;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 1rem;
        transition: all 0.3s ease;
        font-family: 'Inter', sans-serif;
        background: white;
        box-sizing: border-box;
    }

    .form-control:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn-login {
        width: 100%;
        padding: 1rem;
        font-size: 1.1rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: 600;
    }

    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .register-link {
        text-align: center;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid #e0e0e0;
    }

    .register-link a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.3s ease;
    }

    .register-link a:hover {
        color: #764ba2;
    }

    .remember-me {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1.5rem;
    }

    .checkbox-label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        color: #666;
        font-size: 0.9rem;
    }

    .checkbox-label input {
        cursor: pointer;
    }

    .forgot-password {
        color: #667eea;
        text-decoration: none;
        font-size: 0.9rem;
        transition: color 0.3s ease;
    }

    .forgot-password:hover {
        color: #764ba2;
    }

    .demo-credentials {
        background: rgba(102, 126, 234, 0.1);
        border-radius: 12px;
        padding: 1rem;
        margin-top: 1.5rem;
    }

    .demo-title {
        font-weight: 600;
        color: #667eea;
        margin-bottom: 0.5rem;
        font-size: 0.9rem;
    }

    .demo-item {
        font-size: 0.85rem;
        color: #666;
        padding: 0.25rem 0;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .demo-item i {
        color: #4caf50;
        font-size: 0.8rem;
    }

    .demo-item strong {
        color: #333;
    }

    @media (max-width: 768px) {
        .login-card {
            padding: 2rem;
        }
        .remember-me {
            flex-direction: column;
            gap: 0.5rem;
            align-items: flex-start;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <h2>Welcome Back!</h2>
            <p>Sign in to continue your learning journey</p>
        </div>

        <form method="post" action="{% url 'accounts:login' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <i class="fas fa-user"></i>
                <input type="text" name="username" class="form-control" placeholder="Username or Email" required autofocus>
            </div>

            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>

            <div class="remember-me">
                <label class="checkbox-label">
                    <input type="checkbox" name="remember_me" id="rememberMe">
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot-password" id="forgotPassword">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <!-- <div class="demo-credentials">
            <div class="demo-title">
                <i class="fas fa-info-circle"></i> Demo Credentials
            </div>
            <div class="demo-item">
                <i class="fas fa-user-graduate"></i>
                <span><strong>Student:</strong> student / student123</span>
            </div>
            <div class="demo-item">
                <i class="fas fa-chalkboard-teacher"></i>
                <span><strong>Teacher:</strong> teacher / teacher123</span>
            </div>
            <div class="demo-item">
                <i class="fas fa-user-shield"></i>
                <span><strong>Admin:</strong> Fatema / fatema123</span>
            </div>
        </div> -->

        <div class="register-link">
            <p>Don't have an account? <a href="{% url 'accounts:register' %}">Create Account</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Add focus effects to form inputs
    const inputs = document.querySelectorAll('.form-control');
    inputs.forEach(input => {
        input.addEventListener('focus', function() {
            this.parentElement.style.transform = 'translateX(5px)';
        });
        input.addEventListener('blur', function() {
            this.parentElement.style.transform = 'translateX(0)';
        });
    });

    // Forgot password demo
    document.getElementById('forgotPassword').addEventListener('click', function(e) {
        e.preventDefault();
        const username = document.querySelector('input[name="username"]').value;
        if (!username) {
            alert('Please enter your username to reset password.');
        } else {
            alert('Password reset link would be sent to your email. (Demo)');
        }
    });
</script>
{% endblock %}
